const genHistory = (base, days=30) => {
  const d = []; let p = base;
  for(let i=days;i>=0;i--){ const dt=new Date(); dt.setDate(dt.getDate()-i); p=p*(1+(Math.random()-0.48)*0.03);
    d.push({ date:`${dt.getMonth()+1}/${dt.getDate()}`, price:Math.round(p*100)/100, vol:Math.floor(Math.random()*5e6)+5e5 });
  }
  return d;
};

const fmt = (p, m) => m==="KRX" ? `₩${Math.round(p).toLocaleString()}` : `$${p.toFixed(2)}`;
const fmtVol = v => v>=1e8?`${(v/1e8).toFixed(1)}억`:v>=1e4?`${(v/1e4).toFixed(0)}만`:v.toLocaleString();

// ============================================================
// SVG ICONS (inline to avoid external deps)
// ============================================================
const Icon = ({d, size=18, className=""}) => (

  briefcase: (p) => <Icon {...p} d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>,
  barChart: (p) => <Icon {...p} d="M12 20V10M18 20V4M6 20v-4"/>,
  x: (p) => <Icon {...p} d="M18 6L6 18M6 6l12 12"/>,
  trash: (p) => <Icon {...p} d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>,
  settings: (p) => <Icon {...p} d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>,
  eye: (p) => <Icon {...p} d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>,

  refresh: (p) => <Icon {...p} d="M23 4v6h-6M1 20v-6h6M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>,

// Mini sparkline chart using SVG
const Sparkline = ({ data, positive, width=200, height=40 }) => {
  if(!data||data.length<2) return null;
  const prices = data.slice(-14).map(d=>d.price);
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const points = prices.map((p,i) => `${(i/(prices.length-1))*width},${height - ((p-min)/range)*height}`).join(" ");
  const color = positive ? "#22c55e" : "#ef4444";
  const fillPoints = `0,${height} ${points} ${width},${height}`;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id={`sg${positive?1:0}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={fillPoints} fill={`url(#sg${positive?1:0})`}/>
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5"/>
    </svg>
  );
};

// Big chart using SVG
const PriceChart = ({ data, width=800, height=280 }) => {
  if(!data||data.length<2) return null;
  const prices = data.map(d=>d.price);
  const min = Math.min(...prices)*0.98, max = Math.max(...prices)*1.02;
  const range = max-min||1;
  const px = (i) => (i/(data.length-1))*width;
  const py = (p) => height - ((p-min)/range)*height;
  const points = prices.map((p,i) => `${px(i)},${py(p)}`).join(" ");
  const fillPts = `0,${height} ${points} ${width},${height}`;
  // grid lines
  const gridY = Array.from({length:5}, (_,i) => min + (range/4)*i);
  return (
    <svg width="100%" height={height+30} viewBox={`-40 -10 ${width+50} ${height+40}`} preserveAspectRatio="none" style={{overflow:'visible'}}>
      {gridY.map((v,i) => (
        <g key={i}>
          <line x1="0" y1={py(v)} x2={width} y2={py(v)} stroke="#374151" strokeDasharray="3 3"/>
          <text x="-5" y={py(v)+4} textAnchor="end" fill="#9ca3af" fontSize="10">{Math.round(v).toLocaleString()}</text>
        </g>
      ))}
      {data.filter((_,i) => i%5===0).map((d,i) => (
        <text key={i} x={px(data.indexOf(d))} y={height+18} textAnchor="middle" fill="#9ca3af" fontSize="10">{d.date}</text>
      ))}
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.3"/>
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={fillPts} fill="url(#cg)"/>
      <polyline points={points} fill="none" stroke="#3b82f6" strokeWidth="2"/>
    </svg>
  );
};

// Volume chart
const VolumeChart = ({ data, width=800, height=80 }) => {
  if(!data||data.length<2) return null;
  const vols = data.map(d=>d.vol);
  const maxV = Math.max(...vols);
  const bw = width / data.length * 0.7;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
      {data.map((d,i) => {
        const bh = (d.vol/maxV)*height;
        const x = (i/data.length)*width;
        return <rect key={i} x={x} y={height-bh} width={bw} height={bh} fill="#6366f1" rx="1"/>;
      })}
    </svg>
  );
};

// ============================================================
// BADGE COMPONENTS
// ============================================================
const RsiBadge = ({value}) => {
  const c = value<=30?"bg-green-900/60 text-green-400":value>=70?"bg-red-900/60 text-red-400":"bg-gray-700 text-gray-300";
  const l = value<=30?"과매도":value>=70?"과매수":"중립";
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium ${c}`}>RSI {value} ({l})</span>;
};

const MacdBadge = ({value}) => {
  const c={"매수":"bg-green-900/60 text-green-400","매도":"bg-red-900/60 text-red-400","중립":"bg-gray-700 text-gray-300"};
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium ${c[value]}`}>MACD {value}</span>;
};

const SignalBadge = ({type}) => {
  const cfg = {
    buy:{bg:"bg-green-500/20 text-green-400 border-green-500/30",label:"매수",icon:"↑"},
    sell:{bg:"bg-red-500/20 text-red-400 border-red-500/30",label:"매도",icon:"↓"},
    hold:{bg:"bg-yellow-500/20 text-yellow-400 border-yellow-500/30",label:"관망",icon:"→"},
  };
  const c=cfg[type];
  return <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold border ${c.bg}`}>{c.icon} {c.label}</span>;
};

// ============================================================
// MODAL: 종목 검색 & 추가
// ============================================================
const AddStockModal = ({onClose, onAdd, type="watchlist"}) => {
  const [query, setQuery] = useState("");
  const [step, setStep] = useState("search");
  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState({qty:"",avgPrice:"",targetPrice:"",stopLoss:""});

  const results = query.length > 0 ? STOCK_DB.filter(s =>
    s.symbol.toLowerCase().includes(query.toLowerCase()) || s.code.toLowerCase().includes(query.toLowerCase())
  ) : [];

  const handleSelect = (stock) => {
    setSelected(stock);
    if(type==="portfolio"){ setStep("form"); return; }
    const change = (Math.random()-0.4)*8;
    const rsi = Math.floor(Math.random()*60)+20;
    onAdd({
      ...stock, price: stock.basePrice, change: Math.round(change*10)/10,
      rsi, macd: ["매수","중립","매도"][Math.floor(Math.random()*3)],
      volume: Math.floor(Math.random()*1e7)+5e5,
      history: genHistory(stock.basePrice),
    });
    onClose();
  };

  const handleSubmit = () => {
    if(!form.qty||!form.avgPrice) return;
    const avg = Number(form.avgPrice);
    onAdd({
      ...selected, qty:Number(form.qty), avgPrice:avg,
      currentPrice: Math.round(avg*(1+(Math.random()-0.3)*0.1)*100)/100,
      targetPrice: form.targetPrice ? Number(form.targetPrice) : Math.round(avg*1.15*100)/100,
      stopLoss: form.stopLoss ? Number(form.stopLoss) : Math.round(avg*0.9*100)/100,
    });
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-lg shadow-2xl fade-in" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b border-gray-700">
          <h3 className="text-lg font-semibold text-white">{type==="portfolio"?"포트폴리오에 종목 추가":"관심종목 추가"}</h3>
          <button onClick={onClose} className="p-1 hover:bg-gray-700 rounded-lg">{Icons.x({size:20,className:"text-gray-400"})}</button>
        </div>

        {step==="search" && (
          <div className="p-4">
            <div className="relative mb-3">
              <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">{Icons.search({size:18})}</div>
              <input type="text" autoFocus placeholder="종목명 또는 코드 입력 (예: 삼성전자, NVDA)"
                value={query} onChange={e=>setQuery(e.target.value)}
                className="w-full pl-10 pr-4 py-3 bg-gray-900 border border-gray-600 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm"/>
            </div>
            <div className="max-h-72 overflow-y-auto space-y-1">
              {query.length===0 && <p className="text-gray-500 text-sm text-center py-8">종목명이나 코드를 입력하세요</p>}
              {results.length===0 && query.length>0 && <p className="text-gray-500 text-sm text-center py-8">검색 결과가 없습니다</p>}
              {results.map(s => (
                <button key={s.code} onClick={()=>handleSelect(s)}
                  className="w-full flex items-center justify-between p-3 hover:bg-gray-700/50 rounded-lg transition-colors text-left">
                  <div>
                    <span className="text-white font-medium">{s.symbol}</span>
                    <span className="text-gray-500 text-sm ml-2">{s.code}</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-gray-400 text-sm">{fmt(s.basePrice, s.market)}</span>
                    <span className="text-xs px-2 py-0.5 bg-gray-700 text-gray-400 rounded">{s.market}</span>
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {step==="form" && selected && (
          <div className="p-4 space-y-4">
            <div className="flex items-center gap-3 p-3 bg-gray-900/50 rounded-xl">
              <div className="w-10 h-10 bg-blue-600/20 rounded-lg flex items-center justify-center text-blue-400">{Icons.activity({size:20})}</div>
              <div className="flex-1">
                <p className="text-white font-semibold">{selected.symbol}</p>
                <p className="text-gray-500 text-xs">{selected.code} · {selected.market} · 현재가 {fmt(selected.basePrice, selected.market)}</p>
              </div>
              <button onClick={()=>{setStep("search");setSelected(null);}} className="text-gray-400 hover:text-white text-sm">변경</button>
            </div>

            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-gray-400 text-xs block mb-1">보유 수량 *</label>
                <input type="number" placeholder="예: 50" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})}
                  className="w-full px-3 py-2.5 bg-gray-900 border border-gray-600 rounded-lg text-white text-sm focus:outline-none focus:border-blue-500"/>
              </div>
              <div>
                <label className="text-gray-400 text-xs block mb-1">평균 매입가 *</label>
                <input type="number" placeholder={selected.market==="KRX"?"예: 72000":"예: 142.50"} value={form.avgPrice} onChange={e=>setForm({...form,avgPrice:e.target.value})}
                  className="w-full px-3 py-2.5 bg-gray-900 border border-gray-600 rounded-lg text-white text-sm focus:outline-none focus:border-blue-500"/>
              </div>
              <div>
                <label className="text-gray-400 text-xs block mb-1">목표가 <span className="text-gray-600">(선택, 기본 +15%)</span></label>
                <input type="number" placeholder="미입력시 자동" value={form.targetPrice} onChange={e=>setForm({...form,targetPrice:e.target.value})}
                  className="w-full px-3 py-2.5 bg-gray-900 border border-gray-600 rounded-lg text-white text-sm focus:outline-none focus:border-blue-500"/>
              </div>
              <div>
                <label className="text-gray-400 text-xs block mb-1">손절가 <span className="text-gray-600">(선택, 기본 -10%)</span></label>
                <input type="number" placeholder="미입력시 자동" value={form.stopLoss} onChange={e=>setForm({...form,stopLoss:e.target.value})}
                  className="w-full px-3 py-2.5 bg-gray-900 border border-gray-600 rounded-lg text-white text-sm focus:outline-none focus:border-blue-500"/>
              </div>
            </div>

            <button onClick={handleSubmit} disabled={!form.qty||!form.avgPrice}
              className="w-full py-3 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 text-white rounded-xl font-medium transition-colors flex items-center justify-center gap-2">
              {Icons.plus({size:18})} 포트폴리오에 추가
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

// ============================================================
// 알림 규칙 설정 모달
// ============================================================
const AlertRulesModal = ({rules, onUpdate, onClose}) => {
  const [local, setLocal] = useState(rules);
  const toggle = i => { const n=[...local]; n[i]={...n[i],enabled:!n[i].enabled}; setLocal(n); };
  return (
    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-lg shadow-2xl fade-in" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b border-gray-700">
          <h3 className="text-lg font-semibold text-white flex items-center gap-2">{Icons.settings({size:18,className:"text-gray-400"})} 알림 규칙 설정</h3>
          <button onClick={onClose} className="p-1 hover:bg-gray-700 rounded-lg">{Icons.x({size:20,className:"text-gray-400"})}</button>
        </div>
        <div className="p-4 space-y-2 max-h-96 overflow-y-auto">
          {local.map((r,i) => (
            <div key={i} className="flex items-center justify-between p-3 bg-gray-900/50 rounded-lg">
              <div><p className="text-gray-200 text-sm">{r.label}</p><p className="text-gray-500 text-xs mt-0.5">{r.desc}</p></div>
              <button onClick={()=>toggle(i)} className={`w-11 h-6 rounded-full relative transition-colors flex-shrink-0 ${r.enabled?"bg-blue-600":"bg-gray-600"}`}>
                <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${r.enabled?"left-6":"left-1"}`}/>
              </button>
            </div>
          ))}
        </div>
        <div className="p-4 border-t border-gray-700">
          <button onClick={()=>{onUpdate(local);onClose();}} className="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-medium flex items-center justify-center gap-2">
            {Icons.save({size:16})} 저장
          </button>
        </div>
      </div>
    </div>
  );

  {label:"RSI 과매도 (30 이하) 매수 신호",desc:"RSI가 30 밑으로 떨어지면 매수 알림",enabled:true},
  {label:"RSI 과매수 (70 이상) 매도 신호",desc:"RSI가 70 위로 올라가면 매도 알림",enabled:true},
  {label:"골든크로스 (5일/20일)",desc:"5일 이동평균이 20일선을 상향 돌파",enabled:true},
  {label:"데드크로스 (5일/20일)",desc:"5일 이동평균이 20일선을 하향 돌파",enabled:true},
  {label:"거래량 300% 급증",desc:"평균 거래량 대비 3배 이상 거래량 발생",enabled:false},
  {label:"목표가 95% 도달",desc:"설정한 목표가의 95%에 도달 시 알림",enabled:true},
  {label:"손절가 105% 근접",desc:"손절가에 5% 이내로 접근 시 알림",enabled:true},
];

function App() {
  const [tab, setTab] = useState("dashboard");
  const [selectedStock, setSelectedStock] = useState(null);
  const [watchlist, setWatchlist] = useState([]);
  const [portfolio, setPortfolio] = useState([]);
  const [rules, setRules] = useState(DEFAULT_RULES);
  const [showRules, setShowRules] = useState(false);

  const signals = useMemo(()=>{
    return watchlist.map(s=>{
      const reasons = {
        buy:[`RSI ${s.rsi} 과매도 반등`,`5일선 20일선 골든크로스 임박`,`지지선 반등 + 거래량 증가`],
        sell:[`RSI ${s.rsi} 과매수 진입`,`데드크로스 접근 중`,`거래량 급감 + 하락 추세`],
        hold:[`박스권 횡보 중, 관망 추천`,`추세 불명확, 대기`,`이동평균선 수렴 중`],
      };
      const type = s.rsi<=30?"buy":s.rsi>=70?"sell":["buy","sell","hold"][Math.floor(Math.random()*3)];
      const h=Math.floor(Math.random()*8)+9, m=Math.floor(Math.random()*60);
      return {time:`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`, symbol:s.symbol, type, price:s.price, reason:reasons[type][Math.floor(Math.random()*reasons[type].length)]};
    }).sort((a,b)=>a.time.localeCompare(b.time));
  },[watchlist]);

  const handleSelect = symbol => { setSelectedStock(symbol); setTab("detail"); };
  const handleNav = t => { setTab(t); setSelectedStock(null); };

  const tabs = [
    {id:"dashboard", label:"대시보드", icon:Icons.barChart},
    {id:"watchlist", label:"관심종목", icon:Icons.star},
    {id:"portfolio", label:"포트폴리오", icon:Icons.briefcase},
    {id:"signals", label:"시그널", icon:Icons.activity},
  ];

  return (
    <div className="min-h-screen bg-[#111318] text-gray-100">
      <header className="bg-[#111318]/80 backdrop-blur-lg border-b border-gray-800 sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center text-white">
              {Icons.activity({size:18})}
            </div>
            <h1 className="text-lg font-bold text-white">StockPulse</h1>
            <span className="text-xs px-2 py-0.5 bg-blue-600/30 text-blue-400 rounded-full font-medium">Personal</span>
          </div>
          <div className="flex items-center gap-2">
            <button className="p-2 hover:bg-gray-800 rounded-lg">{Icons.refresh({size:18,className:"text-gray-400"})}</button>
            <button className="p-2 hover:bg-gray-800 rounded-lg relative">
              {Icons.bell({size:18,className:"text-gray-400"})}
              {signals.length>0&&<span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"/>}
            </button>
            <button onClick={()=>setShowRules(true)} className="p-2 hover:bg-gray-800 rounded-lg">{Icons.settings({size:18,className:"text-gray-400"})}</button>
          </div>
        </div>
      </header>

      <div className="max-w-7xl mx-auto px-4 py-6">
        <nav className="flex gap-1 mb-6 bg-gray-800/50 rounded-xl p-1 overflow-x-auto">
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>handleNav(t.id)}
              className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium transition-all whitespace-nowrap ${
                tab===t.id||(tab==="detail"&&t.id==="watchlist") ? "bg-gray-700 text-white shadow-lg":"text-gray-400 hover:text-gray-200"
              }`}>
              {t.icon({size:18})} {t.label}
              {t.id==="signals"&&signals.length>0&&<span className="bg-blue-600 text-white text-xs px-1.5 py-0.5 rounded-full ml-1">{signals.length}</span>}
            </button>
          ))}
        </nav>

        {tab==="dashboard"&&<DashboardView portfolio={portfolio} signals={signals} onNav={handleNav}/>}
        {tab==="watchlist"&&<WatchlistView watchlist={watchlist} setWatchlist={setWatchlist} onSelect={handleSelect}/>}
        {tab==="portfolio"&&<PortfolioView portfolio={portfolio} setPortfolio={setPortfolio}/>}
        {tab==="signals"&&<SignalView signals={signals} onOpenRules={()=>setShowRules(true)}/>}
        {tab==="detail"&&selectedStock&&<StockDetailView symbol={selectedStock} watchlist={watchlist} onBack={()=>setTab("watchlist")}/>}
      </div>

      <footer className="border-t border-gray-800 mt-8 py-4">
        <div className="max-w-7xl mx-auto px-4 flex items-center justify-between text-xs text-gray-600">
          <span>StockPulse v0.1 · 개인용</span>
          <span>데이터: 네이버증권 · Yahoo Finance · Alpha Vantage · Finnhub</span>
        </div>
      </footer>

      {showRules&&<AlertRulesModal rules={rules} onUpdate={setRules} onClose={()=>setShowRules(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
